<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pdf2skill Frontend</title>
    <style>
      :root {
        --bg: #f4f7ff;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --border: #e5e7eb;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 60%);
        color: var(--text);
      }
      .wrap {
        max-width: 860px;
        margin: 36px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(37, 99, 235, 0.08);
      }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { margin: 0 0 16px; color: var(--muted); }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .full { grid-column: 1 / -1; }
      label { font-size: 13px; color: #374151; }
      input, select, button {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
      }
      input:focus, select:focus { border-color: var(--primary); outline: none; }
      button {
        background: var(--primary);
        color: white;
        border: 0;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: wait; }
      #status { margin-top: 12px; color: var(--muted); white-space: pre-wrap; }
      .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
      @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>pdf2skill Frontend</h1>
        <p>独立前端仓库：上传 PDF，调用后端 API 编译 skills.zip。</p>

        <form id="compileForm" class="grid">
          <div class="field full">
            <label for="apiBase">API Base URL</label>
            <input id="apiBase" name="apiBase" placeholder="https://api.example.com" />
            <div class="hint">留空表示同域请求（例如通过反向代理统一域名）。</div>
          </div>

          <div class="field full">
            <label for="compileToken">Compile Token</label>
            <input id="compileToken" name="compileToken" type="password" placeholder="填写后端 COMPILE_TOKEN" />
            <div class="hint">后端开启 COMPILE_TOKEN 时必填，会以请求头 <code>x-compile-token</code> 发送。</div>
          </div>

          <div class="field full">
            <label for="pdfs">PDF 文件（可多选）</label>
            <input id="pdfs" name="pdfs" type="file" accept="application/pdf" multiple required />
          </div>

          <div class="field">
            <label for="name">Skill 名称</label>
            <input id="name" name="name" value="my-skill-pack" required />
          </div>

          <div class="field">
            <label for="lang">语言模式</label>
            <select id="lang" name="lang">
              <option value="auto" selected>auto</option>
              <option value="zh">zh</option>
              <option value="en">en</option>
            </select>
          </div>

          <div class="field">
            <label for="maxChunks">max-chunks</label>
            <input id="maxChunks" name="maxChunks" type="number" value="24" min="4" max="200" />
          </div>

          <div class="field">
            <label for="minScore">min-score</label>
            <input id="minScore" name="minScore" type="number" value="55" min="0" max="100" />
          </div>

          <div class="field full">
            <button id="submitBtn" type="submit">开始编译并下载 ZIP</button>
          </div>
        </form>

        <div id="status">等待上传...</div>
      </div>
    </div>

    <script>
      const form = document.getElementById("compileForm");
      const statusBox = document.getElementById("status");
      const submitBtn = document.getElementById("submitBtn");
      const apiBaseInput = document.getElementById("apiBase");
      const tokenInput = document.getElementById("compileToken");

      function parseFilenameFromDisposition(disposition) {
        if (!disposition) return "skills.zip";
        const m = disposition.match(/filename=\"?([^\";]+)\"?/i);
        return m ? m[1] : "skills.zip";
      }

      function getApiBase() {
        return (apiBaseInput.value || "").trim().replace(/\/$/, "");
      }

      function getCompileToken() {
        return (tokenInput.value || "").trim();
      }

      function loadSavedConfig() {
        const savedApiBase = window.localStorage.getItem("pdf2skill.apiBase") || "";
        const savedToken = window.localStorage.getItem("pdf2skill.compileToken") || "";
        if (savedApiBase) apiBaseInput.value = savedApiBase;
        if (savedToken) tokenInput.value = savedToken;
      }

      function saveConfig() {
        window.localStorage.setItem("pdf2skill.apiBase", getApiBase());
        window.localStorage.setItem("pdf2skill.compileToken", getCompileToken());
      }

      loadSavedConfig();

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const files = document.getElementById("pdfs").files;
        if (!files || files.length === 0) {
          statusBox.textContent = "请至少选择一个 PDF 文件。";
          return;
        }

        const fd = new FormData(form);
        fd.delete("apiBase");
        fd.delete("compileToken");

        submitBtn.disabled = true;
        statusBox.textContent = "编译中，请稍候...";

        try {
          const apiBase = getApiBase();
          const compileToken = getCompileToken();
          saveConfig();

          const url = `${apiBase}/api/compile`;
          const headers = {};
          if (compileToken) {
            headers["x-compile-token"] = compileToken;
          }

          const resp = await fetch(url, { method: "POST", headers, body: fd });

          if (!resp.ok) {
            let errText = "编译失败";
            try {
              const data = await resp.json();
              if (data && data.error) errText = data.error;
            } catch (_) {}
            if (resp.status === 401) {
              errText = "鉴权失败：请检查 Compile Token 是否正确。";
            }
            throw new Error(errText);
          }

          const blob = await resp.blob();
          const filename = parseFilenameFromDisposition(resp.headers.get("content-disposition"));
          const dlUrl = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = dlUrl;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(dlUrl);
          statusBox.textContent = "编译成功，ZIP 已开始下载。";
        } catch (err) {
          statusBox.textContent = `编译失败: ${err.message}`;
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
